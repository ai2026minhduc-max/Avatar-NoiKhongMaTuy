<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khung Avatar - Nói không với ma túy</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>NÓI KHÔNG VỚI MA TÚY</h1>

    <!-- Thêm id="capture" vào đây để html2canvas chụp đúng vùng này -->
    <div class="avatar-container" id="capture">

        <img id="userImage" src="" alt="Ảnh người dùng">

        <img id="frame"
             src="assets/avatar-frame.png"
             alt="Khung Avatar">

    </div>

    <div class="controls">

        <input
            type="file"
            id="upload"
            accept="image/*">

        <button id="resetBtn">
            🔄 Reset
        </button>

        <button id="downloadBtn">
            💾 Tải ảnh
        </button>

    </div>

    <div class="zoom-control">

        <label for="zoomSlider">
            🔍 Thu phóng
        </label>

        <input
            type="range"
            id="zoomSlider"
            min="20"
            max="300"
            value="100">

    </div>

    <!-- Thư viện chụp ảnh -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- JavaScript xử lý toàn bộ chức năng của website -->
    <script>
        const upload = document.getElementById('upload');
        const userImage = document.getElementById('userImage');
        const zoomSlider = document.getElementById('zoomSlider');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const captureArea = document.getElementById('capture');

        // 1. Chức năng Chọn và Hiện ảnh (Sửa lỗi chính của bạn)
        upload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const objectURL = URL.createObjectURL(file);
                userImage.src = objectURL;
                
                // Trả các thanh cuộn về mặc định khi có ảnh mới
                zoomSlider.value = 100;
                userImage.style.transform = 'translate(-50%, -50%) scale(1)';
            }
        });

        // 2. Chức năng Thu phóng ảnh
        zoomSlider.addEventListener('input', function() {
            const scaleValue = zoomSlider.value / 100;
            userImage.style.transform = `translate(-50%, -50%) scale(${scaleValue})`;
        });

        // 3. Chức năng Reset
        resetBtn.addEventListener('click', function() {
            upload.value = ''; // Xóa file trong input
            userImage.src = ''; // Xóa ảnh hiển thị
            zoomSlider.value = 100; // Đưa thu phóng về 100%
            userImage.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        // 4. Chức năng Tải ảnh xuống (Sử dụng html2canvas)
        downloadBtn.addEventListener('click', function() {
            if (!userImage.src || userImage.src === window.location.href) {
                alert('Vui lòng chọn ảnh trước khi tải về!');
                return;
            }

            // Tiến hành chụp khung avatar và tải về
            html2canvas(captureArea, {
                useCORS: true, // Hỗ trợ tải ảnh nếu có dính bản quyền cors
                allowTaint: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'avatar-noi-khong-voi-ma-tuy.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>

</body>

</html>
